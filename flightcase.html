<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Flight Case Labels — ER Productions</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0d2137;--navy2:#1a3a57;--navy3:#1f4e79;--blue:#2471a3;
  --surface:#f4f6f9;--card:#fff;--border:#dde3ec;--text:#1a2535;--muted:#6b7a92;--faint:#e8ecf2;
  font-family:'Arial Narrow',Arial,sans-serif;font-size:14px;color:var(--text);background:var(--surface)
}
body{display:grid;grid-template-rows:56px 1fr;min-height:100vh}
#topbar{background:var(--navy);display:flex;align-items:center;justify-content:space-between;padding:0 20px;gap:16px;box-shadow:0 2px 8px rgba(0,0,0,.3);position:sticky;top:0;z-index:10}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.logo-bolt{width:28px;height:28px;background:#f39c12;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:var(--navy)}
.logo-text{font-weight:700;font-size:18px;letter-spacing:1px;color:white}
.logo-sub{font-size:10px;color:rgba(255,255,255,.5);letter-spacing:2px}
.top-controls{display:flex;align-items:center;gap:10px}
.top-btn{padding:6px 14px;font-size:11px;font-weight:600;border-radius:4px;cursor:pointer;border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.12);color:rgba(255,255,255,.85)}
.top-btn:hover{background:rgba(255,255,255,.22);color:white}
.top-btn.primary{background:var(--navy3);border-color:var(--navy3);color:white}
.top-btn.primary:hover{background:#2471a3}
.top-btn.danger{background:#7b2222;border-color:#7b2222;color:white}
.top-btn.danger:hover{background:#9b3232}
.back-link{color:rgba(255,255,255,.7);text-decoration:none;font-size:12px;font-weight:600;padding:6px 10px;border-radius:4px}
.back-link:hover{color:white;background:rgba(255,255,255,.1)}
main{padding:24px;max-width:1100px;margin:0 auto;width:100%}
h1{font-size:22px;font-weight:700;color:var(--navy3);margin-bottom:4px}
.page-sub{font-size:12px;color:var(--muted);margin-bottom:20px}
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.tour-wrap{display:flex;align-items:center;gap:8px;flex:1;min-width:220px}
.tour-wrap label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.tour-input{padding:7px 10px;border:1px solid var(--border);border-radius:5px;font-size:13px;font-family:inherit;outline:none;flex:1;background:white}
.tour-input:focus{border-color:var(--navy3)}
.logo-upload-wrap{display:flex;align-items:center;gap:6px}
.logo-status{font-size:11px;color:var(--muted)}
.logo-status.loaded{color:#1a6b3a;font-weight:600}
table{width:100%;border-collapse:collapse;background:white;border-radius:8px;overflow:visible;box-shadow:0 1px 4px rgba(0,0,0,.08)}
thead tr{background:var(--navy);color:white}
thead th{padding:11px 12px;text-align:left;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
thead th.num-col{width:50px;text-align:center}
thead th.act-col{width:80px;text-align:center}
tbody tr{border-bottom:1px solid var(--faint)}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#f8f9fb}
tbody td{padding:6px 8px;vertical-align:middle}
tbody td.num-cell{text-align:center;font-weight:700;color:var(--muted);font-size:12px}
.row-input{width:100%;padding:6px 8px;border:1px solid transparent;border-radius:4px;font-size:13px;font-family:inherit;background:transparent;outline:none;color:var(--text)}
.row-input:focus{border-color:var(--navy3);background:white}
.row-input::placeholder{color:#ccc}
.del-btn{padding:4px 8px;border:none;background:none;color:#ccc;cursor:pointer;font-size:16px;border-radius:3px}
.del-btn:hover{color:#921e2e;background:#fde0e3}
.add-row-btn{display:flex;align-items:center;gap:6px;padding:8px 16px;border:2px dashed var(--border);border-radius:6px;background:none;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;width:100%;margin-top:8px;justify-content:center}
.add-row-btn:hover{border-color:var(--navy3);color:var(--navy3);background:var(--faint)}
.swatch-wrap{position:relative;display:inline-block}
.swatch-btn{width:32px;height:28px;border-radius:4px;border:2px solid #ccc;cursor:pointer;display:block}
.swatch-btn:hover{border-color:#333}
.swatch-panel{display:none;position:fixed;background:white;border:1px solid var(--border);border-radius:6px;box-shadow:0 4px 16px rgba(0,0,0,.25);padding:6px;z-index:9999;width:112px}
.swatch-panel.open{display:grid;grid-template-columns:repeat(4,1fr);gap:4px}
.swatch-opt{width:22px;height:22px;border-radius:3px;border:1px solid rgba(0,0,0,.2);cursor:pointer}
.swatch-opt:hover{transform:scale(1.2);border-color:#333}
.swatch-opt.selected{border:2px solid #000}
@media print{
  body,html{margin:0;padding:0;background:white}
  #topbar,.toolbar,.add-row-btn,.del-btn,.no-print{display:none!important}
  main{padding:0;max-width:none}
  h1,.page-sub{display:none}
}
</style>
</head>
<body>
<header id="topbar">
  <a class="logo" href="index.html">
    <div class="logo-bolt">&#9889;</div>
    <div>
      <div class="logo-text">ER EQUIPMENT CALCULATOR</div>
      <div class="logo-sub">FLIGHT CASE LABELS</div>
    </div>
  </a>
  <div class="top-controls">
    <button class="top-btn" onclick="triggerLogoUpload()">&#128444; Logo</button>
    <button class="top-btn" onclick="addRow()">&#43; Add Row</button>
    <button class="top-btn" onclick="clearAll()">&#128465; Clear All</button>
    <button class="top-btn danger" onclick="printLabels()">&#128424; Print Labels</button>
  </div>
</header>

<main>
  <h1>Flight Case Labels</h1>
  <p class="page-sub">Avery 5126 &bull; A4 &bull; 177mm&times;127mm &bull; 2 per sheet &bull; 5mm rounded trim box</p>

  <div class="toolbar">
    <div class="tour-wrap">
      <label>Tour / Show Name:</label>
      <input type="text" class="tour-input" id="tourName" placeholder="e.g. World Tour 2026" oninput="saveTour()">
    </div>
    <div class="tour-wrap">
      <label>Total Boxes:</label>
      <input type="number" class="tour-input" id="totalBoxes" placeholder="e.g. 24" min="1" style="width:80px" oninput="saveToStorage()">
    </div>
    <div class="logo-upload-wrap">
      <button class="top-btn" onclick="document.getElementById('companyLogoInput').click()">&#127970; Company Logo</button>
      <input type="file" id="companyLogoInput" accept="image/*" style="display:none" onchange="handleCompanyLogo(event)">
      <span class="logo-status loaded" id="companyLogoStatus">✔ ER Productions (permanent)</span>
    </div>

  </div>

  <table id="caseTable">
    <thead>
      <tr>
        <th class="num-col">#</th>
        <th style="width:60px;text-align:center">Colour</th>
        <th style="width:120px">Box Number</th>
        <th style="width:200px">Location</th>
        <th>Description</th>
        <th class="act-col">Remove</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
  <button class="add-row-btn" onclick="addRow()">&#43; Add Flight Case</button>
</main>

// ── INIT ──────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', function() {
  loadFromStorage();
  if (!rows.length) { addRow(); addRow(); addRow(); }
  renderTable();
  updateTotalBoxes();
});

// ── LOGO ─────────────────────────────────────────────────────
function triggerLogoUpload() { document.getElementById('logoInput').click(); }
function handleCompanyLogo(e) {
  var file = e.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    companyLogoURL = ev.target.result;
    document.getElementById('companyLogoStatus').textContent = '✔ ' + file.name;
    document.getElementById('companyLogoStatus').className = 'logo-status loaded';
    saveToStorage();
  };
  reader.readAsDataURL(file);
  e.target.value = '';
}

function handleLogoUpload(e) {
  var file = e.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    logoDataURL = ev.target.result;
    document.getElementById('logoStatus').textContent = '\u2714 Logo loaded: ' + file.name;
    document.getElementById('logoStatus').className = 'logo-status loaded';
    saveToStorage();
  };
  reader.readAsDataURL(file);
  e.target.value = '';
}

// ── ROWS ─────────────────────────────────────────────────────
function addRow() {
  var nextNum = rows.length + 1;
  var padded = nextNum < 10 ? '0' + nextNum : '' + nextNum;
  rows.push({box: padded, location:'', description:'', colour:'#0d2137'});
  renderTable();
  updateTotalBoxes();
  saveToStorage();
}

function deleteRow(idx) {
  rows.splice(idx, 1);
  // Re-number box fields that match the old auto-increment pattern
  for (var i = 0; i < rows.length; i++) {
    var expected = (i + 2 < 10 ? '0' : '') + (i + 2);
    var next = (i + 1 < 10 ? '0' : '') + (i + 1);
    if (rows[i].box === expected || rows[i].box === '' + (i + 2)) {
      rows[i].box = next;
    }
  }
  renderTable();
  updateTotalBoxes();
  saveToStorage();
}

function updateTotalBoxes() {
  document.getElementById('totalBoxes').value = rows.length;
  saveToStorage();
}

function clearAll() {
  if (!confirm('Clear all rows and remove uploaded logo?')) return;
  rows = [];
  logoDataURL = null;
  // Restore permanent embedded logo
  companyLogoURL = document.querySelector('script').textContent.match(/var companyLogoURL = "([^"]+)"/)?.[1] || null;
  document.getElementById('companyLogoStatus').textContent = '\u2714 ER Productions (permanent)';
  document.getElementById('companyLogoStatus').className = 'logo-status loaded';
  try { localStorage.removeItem('er_fc_company'); } catch(e) {}
  try { localStorage.removeItem('er_fc_logo'); localStorage.removeItem('er_fc_company'); } catch(e) {}
  addRow();
  saveToStorage();
}

function updateRow(idx, field, val) {
  rows[idx][field] = val;
  saveToStorage();
}

var COLOURS = [
  '#c0392b','#e67e22','#f1c40f','#27ae60',
  '#1abc9c','#2980b9','#8e44ad','#2c3e50',
  '#e91e63','#ff5722','#8bc34a','#00bcd4',
  '#3f51b5','#9c27b0','#ffffff','#000000'
];

function swatchHtml(idx, selected) {
  var btn = '<div class="swatch-btn" style="background:' + selected + '" onclick="toggleSwatch(' + idx + ',event)"></div>';
  var opts = COLOURS.map(function(c) {
    return '<div class="swatch-opt' + (c === selected ? ' selected' : '') + '" style="background:' + c + '" onclick="pickColour(' + idx + ',\'' + c + '\',event)" title="' + c + '"></div>';
  }).join('');
  return btn + '<div class="swatch-panel" id="sp' + idx + '">' + opts + '</div>';
}

function toggleSwatch(idx, e) {
  e.stopPropagation();
  var panel = document.getElementById('sp' + idx);
  var isOpen = panel.classList.contains('open');
  document.querySelectorAll('.swatch-panel').forEach(function(p) { p.classList.remove('open'); });
  if (!isOpen) {
    var btn = e.currentTarget;
    var rect = btn.getBoundingClientRect();
    panel.style.top = (rect.bottom + 4) + 'px';
    panel.style.left = (rect.left - 40) + 'px';
    panel.classList.add('open');
  }
}

function pickColour(idx, colour, e) {
  e.stopPropagation();
  updateRow(idx, 'colour', colour);
  // Update swatch button colour without full re-render
  var wrap = document.getElementById('sw' + idx);
  if (wrap) {
    wrap.querySelector('.swatch-btn').style.background = colour;
    wrap.querySelectorAll('.swatch-opt').forEach(function(o) {
      o.classList.toggle('selected', o.title === colour);
    });
  }
  document.getElementById('sp' + idx).classList.remove('open');
}

// Close swatches when clicking outside
document.addEventListener('click', function() {
  document.querySelectorAll('.swatch-panel').forEach(function(p) { p.classList.remove('open'); });
});

function renderTable() {
  var tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';
  for (var i = 0; i < rows.length; i++) {
    var r = rows[i];
    var tr = document.createElement('tr');
    tr.innerHTML =
      '<td class="num-cell">' + (i+1) + '</td>' +
      '<td style="text-align:center"><div class="swatch-wrap" id="sw' + i + '">' + swatchHtml(i, r.colour||'#0d2137') + '</div></td>' +
      '<td><input class="row-input" placeholder="e.g. BOX-01" value="' + esc(r.box) + '" oninput="updateRow(' + i + ',\'box\',this.value)"></td>' +
      '<td><input class="row-input" placeholder="e.g. Stage Left" value="' + esc(r.location) + '" oninput="updateRow(' + i + ',\'location\',this.value)"></td>' +
      '<td><input class="row-input" placeholder="e.g. Lasers &amp; cables" value="' + esc(r.description) + '" oninput="updateRow(' + i + ',\'description\',this.value)"></td>' +
      '<td style="text-align:center"><button class="del-btn" onclick="deleteRow(' + i + ')">&#10005;</button></td>';
    tbody.appendChild(tr);
  }
}

function esc(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── STORAGE ───────────────────────────────────────────────────
function saveToStorage() {
  try {
    localStorage.setItem('er_fc_rows', JSON.stringify(rows));
    localStorage.setItem('er_fc_tour', document.getElementById('tourName').value);
    localStorage.setItem('er_fc_total', document.getElementById('totalBoxes').value);
    if (logoDataURL) localStorage.setItem('er_fc_logo', logoDataURL);
    if (companyLogoURL) localStorage.setItem('er_fc_company', companyLogoURL);
  } catch(e) {}
}

function loadFromStorage() {
  try {
    var r = localStorage.getItem('er_fc_rows');
    if (r) rows = JSON.parse(r);
    var t = localStorage.getItem('er_fc_tour');
    if (t) document.getElementById('tourName').value = t;
    var tb = localStorage.getItem('er_fc_total');
    if (tb) document.getElementById('totalBoxes').value = tb;
    var l = localStorage.getItem('er_fc_logo');
    if (l) { logoDataURL = l; }
    var cl = localStorage.getItem('er_fc_company');
    if (cl) {
      companyLogoURL = cl;
      document.getElementById('companyLogoStatus').textContent = '\u2714 Custom logo loaded';
      document.getElementById('companyLogoStatus').className = 'logo-status loaded';
    }
  } catch(e) {}
}

function saveTour() { saveToStorage(); }

// ── PRINT ─────────────────────────────────────────────────────
function printLabels() {
  var tourName = document.getElementById('tourName').value.trim() || 'ER Productions';
  var totalBoxes = document.getElementById('totalBoxes').value.trim();
  var validRows = rows.filter(function(r) { return r.box || r.location || r.description; });

  if (!validRows.length) {
    alert('Please fill in at least one row before printing.');
    return;
  }

  var labelsHtml = '';
  for (var i = 0; i < validRows.length; i++) {
    var r = validRows[i];
    var hdrColor = r.colour || '#0d2137';
    var wmHtml = logoDataURL ? '<img src="' + logoDataURL + '" class="watermark">' : '';

    // Top left: company logo (always shown if uploaded)
    var companyHtml = companyLogoURL
      ? '<div class="top-logo-wrap"><img src="' + companyLogoURL + '" class="top-logo"></div>'
      : '<div class="top-logo-wrap top-logo-empty"></div>';

    labelsHtml +=
      '<div class="label">' +
        '<div class="lbl-trim">' +
        '<div class="lbl-body">' +
          wmHtml +

          // TOP THIRD: company logo left 1/3, tour name right 2/3
          '<div class="top-zone" style="background:' + hdrColor + '">' +
            companyHtml +
            '<div class="tour-name"><span id="tn' + i + '">' + tourName + '</span></div>' +
          '</div>' +

          // MIDDLE THIRD: Description
          '<div class="mid-zone">' +
            '<div class="zone-label">DESCRIPTION</div>' +
            '<div class="zone-value desc-value"><span id="desc' + i + '">' + (r.description || '&mdash;') + '</span></div>' +
          '</div>' +

          // BOTTOM THIRD: Location | Box Number
          '<div class="bot-zone">' +
            '<div class="bot-cell" style="border-right:3px solid #111">' +
              '<div class="zone-label">LOCATION</div>' +
              '<div class="zone-value">' + (r.location || '&mdash;') + '</div>' +
            '</div>' +
            '<div class="bot-cell">' +
              '<div class="zone-label">BOX NUMBER</div>' +
              '<div class="zone-value box-value">' + (r.box || '&mdash;') + '</div>' +
              (totalBoxes ? '<div class="of-total">of ' + totalBoxes + '</div>' : '') +
            '</div>' +
          '</div>' +

        '</div>' +
        '</div>' +
      '</div>';
  }

  var css =
    '* { box-sizing:border-box; margin:0; padding:0; }' +
    'body { font-family:Arial,sans-serif; background:white; -webkit-print-color-adjust:exact; print-color-adjust:exact; }' +
    '@page { size:210mm 297mm; margin:0; }' +
    'body { display:flex; flex-direction:column; align-items:center; padding:21.5mm 0; gap:0; }' +
    '.label { width:177mm; height:127mm; page-break-inside:avoid; margin-bottom:0; flex-shrink:0; }' +
    '.label:nth-child(2) { margin-top:0; }' +
    '.lbl-trim { width:177mm; height:127mm; border:1.5px solid #000; border-radius:5mm; overflow:hidden; position:relative; }' +
    '.lbl-body { width:100%; height:100%; display:flex; flex-direction:column; position:relative; overflow:hidden; }' +

    // Watermark
    '.watermark { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:65%; max-height:80%; object-fit:contain; opacity:0.25; pointer-events:none; z-index:0; }' +

    // Top zone
    '.top-zone { height:33.33%; flex-shrink:0; display:flex; align-items:stretch; border-bottom:3px solid #111; position:relative; z-index:1; }' +
    '.top-logo-wrap { width:33%; border-right:3px solid rgba(255,255,255,.3); display:flex; align-items:center; justify-content:center; padding:0; flex-shrink:0; overflow:hidden; }' +
    '.top-logo { width:100%; height:100%; object-fit:cover; display:block; }' +
    '.tour-name { flex:1; display:flex; align-items:center; justify-content:center; color:white; text-align:center; padding:6pt 10pt; overflow:hidden; }' +
    '.tour-name span { font-weight:900; line-height:1.05; display:block; word-break:break-word; white-space:normal; text-align:center; }' +

    // Mid zone
    '.mid-zone { height:33.33%; flex-shrink:0; border-bottom:3px solid #111; display:flex; flex-direction:column; padding:6pt 14pt 6pt; position:relative; z-index:1; box-sizing:border-box; }' +
    '.zone-label { font-size:7pt; font-weight:900; color:#555; text-transform:uppercase; letter-spacing:2px; flex-shrink:0; }' +
    '.zone-value { flex:1; display:flex; align-items:center; justify-content:center; font-size:34pt; font-weight:900; color:#111; line-height:1.05; text-align:center; width:100%; overflow:hidden; }' +
    '.desc-value { font-size:26pt; word-break:break-word; white-space:normal; }' +
    '.desc-value span { font-weight:900; line-height:1.05; display:block; word-break:break-word; white-space:normal; text-align:center; }' +

    // Bot zone
    '.bot-zone { height:33.33%; flex-shrink:0; display:flex; position:relative; z-index:1; }' +
    '.bot-cell { flex:1; display:flex; flex-direction:column; padding:6pt 14pt; box-sizing:border-box; }' +
    '.box-value { flex-direction:column; gap:0; font-size:38pt; }' +
    '.of-total { font-size:11pt; font-weight:600; color:#666; line-height:1; }' +

    '.no-print { position:fixed; bottom:16px; right:16px; display:flex; gap:8px; z-index:99; }' +
    '@media print { .no-print { display:none; } }';

  var html = '<!DOCTYPE html><html><head><meta charset="utf-8"><title>Flight Case Labels</title>' +
    '<style>' + css + '</style></head><body>' +
    labelsHtml +
    '<div class="no-print">' +
    '<button onclick="window.close()" style="padding:8px 18px;border:1px solid #ccc;border-radius:5px;background:white;font-size:13px;font-weight:600;cursor:pointer">&#10005; Close</button>' +
    '<button onclick="window.print()" style="padding:8px 22px;border:none;border-radius:5px;background:#0d2137;color:white;font-size:13px;font-weight:700;cursor:pointer">Print Labels</button>' +
    '<scr' + 'ipt>' +
    'window.addEventListener("load",function(){' +
    '  function fitText(box, span, fraction) {' +
    '    if (!span || !box.clientWidth) return;' +
    '    var maxW = box.clientWidth - 20;' +
    '    var maxH = box.clientHeight * (fraction || 0.95) - 10;' +
    '    var lo = 8, hi = 200, size = 8;' +
    '    span.style.fontSize = lo + "pt";' +
    '    while (lo <= hi) {' +
    '      var mid = Math.floor((lo + hi) / 2);' +
    '      span.style.fontSize = mid + "pt";' +
    '      if (span.scrollWidth <= maxW && span.scrollHeight <= maxH) {' +
    '        size = mid; lo = mid + 1;' +
    '      } else { hi = mid - 1; }' +
    '    }' +
    '    span.style.fontSize = Math.max(8, size - 1) + "pt";' +
    '  }' +
    '  setTimeout(function(){' +
    '    document.querySelectorAll(".tour-name").forEach(function(box){' +
    '      var span = box.querySelector("span");' +
    '      if (span) { span.style.width = box.clientWidth - 20 + "px"; }' +
    '      fitText(box, span, 0.95);' +
    '    });' +
    '    document.querySelectorAll(".desc-value").forEach(function(box){' +
    '      var span = box.querySelector("span");' +
    '      if (span) { span.style.width = box.clientWidth - 20 + "px"; span.style.whiteSpace = "normal"; }' +
    '      fitText(box, span, 0.66);' +
    '    });' +
    '  }, 150);' +
    '});' +
    '<\/scr' + 'ipt>' +
    '</body></html>';

  var win = window.open('', '_blank');
  win.document.write(html);
  win.document.close();
  win.focus();
}




</script>
</body>
</html>
